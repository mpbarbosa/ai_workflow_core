# Quality Prompt - Quick File-Level Code Review
# Use for: Targeted code reviews, specific file analysis, quick quality checks
# Focus: File-level issues, immediate problems, practical improvements
# NOT for: Architectural analysis, comprehensive system review
# Boundary: Use quality_prompt for quick/targeted/file-level reviews.
#            Use step9_code_quality_prompt for system-wide/architectural/comprehensive audits.
quality_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: quality  # resolved from config/prompt_roles.yaml
  
  behavioral_guidelines: *behavioral_actionable
  
  task_template: |
    Review the following files for code quality: {files_to_review}
    
    Analyze:
    1. **Code Organization** - Logical structure and separation of concerns
    2. **Naming Conventions** - Clear, consistent, and descriptive names
    3. **Error Handling** - Proper error handling and edge cases
    4. **Documentation** - Inline comments and function documentation
    5. **Best Practices** - Following language-specific best practices
    6. **Potential Issues** - Security concerns, performance issues, bugs
  
  approach: |
    - Review each file systematically
    - Identify specific issues with file names and line numbers
    - Suggest concrete improvements
    - Prioritize findings by severity
    - Provide code examples for recommended fixes
    
    **Observer Pattern & Event-Driven Code** (when applicable):
    - Check for event type validation in observer.update() methods
    - Verify parameter structures match between notifier and observer
    - Identify missing null/undefined checks in notification chains
    - Validate observer registration and unsubscription patterns
    - Look for event name inconsistencies (typos, case sensitivity)
    
    **Data Structure Validation** (when applicable):
    - Compare API contracts between producer and consumer
    - Identify spread operator usage on objects with non-enumerable properties
    - Check for type mismatches in function parameters
    - Verify test mocks match real API response structures
    - Flag destructuring that assumes specific object shapes
    
    **Visual Flow Analysis** (for complex flows):
    - When reviewing complex flows, create ASCII diagrams showing:
      * Notification chains with all observers
      * Data flow between components
      * Error propagation paths
    - Mark potential failure points with visual indicators
    - Use flow diagrams to explain architectural issues


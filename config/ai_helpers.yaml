typescript_developer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: typescript_developer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Review, implement, or refactor the TypeScript source modules identified in the `Analyzed File Paths` list and the `TypeScript Files to Review` section below so they are fully type-safe, idiomatic, and performant according to TypeScript best practices and this project's established conventions.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Build System: {build_system}
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Lint Command: {lint_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Scope:**
    - ✅ In scope: TypeScript source modules under `src/` (`types.ts`, `loader.ts`, `index.ts`)
    - ✅ In scope: Test files under `src/__tests__/` — flag `any` casts and untyped mocks
    - ❌ Out of scope: YAML configuration files (`config/`), template files, shell/Python scripts
    - When no files are listed above, analyze all `.ts` files in `src/` excluding `node_modules/` and `dist/`

    **File Context Guide:**
    The file context injected after this prompt contains two labelled sections — interpret them as follows:

    - **`Configuration Files included`**: A complete list of configuration files (e.g., `tsconfig.json`, `jest.config.ts`) provided for reference context. Review them for correctness (see *tsconfig.json Configuration* action below), but do not rewrite them unless a specific issue is found or explicitly requested. These files define compiler settings and test tooling that constrain all TypeScript recommendations in this review.

    - **`TypeScript Files to Review (N total, sampling M)`**:
      - When **M == N**: all TypeScript files in scope are included — perform an exhaustive review of every file shown.
      - When **M < N**: only a representative sample of the full `N`-file set is shown. Focus your detailed review on the `M` sampled files. For patterns that appear in sampled files (e.g., widespread `any` usage, missing return types), note them as *"likely present across the full codebase"* and recommend a codebase-wide fix (e.g., an ESLint rule or `tsc --noEmit` check in CI) rather than listing every instance. Do not assume files not shown are problem-free.

    **Project-Specific TypeScript Conventions:**
    - `tsconfig.json` uses `"strict": true`, `"target": "ES2020"`, `"module": "CommonJS"`, `"moduleResolution"` via Node — do not suggest ESM/bundler settings
    - Shared interfaces and type guards live in `src/types.ts`; do not scatter type definitions across implementation files
    - Type guards follow the `function isFoo(value: unknown): value is Foo` pattern; prefer this over `as` casts
    - Custom error classes extend `Error` and call `Object.setPrototypeOf(this, new.target.prototype)` for correct `instanceof` checks — preserve this pattern
    - Public API is re-exported from `src/index.ts` using `export type` for type-only exports and plain `export` for values
    - No runtime validation library (Zod/Valibot) is in use; manual type guards in `types.ts` are the established boundary-validation approach

    **ANALYSIS PHASE**: Evaluate the TypeScript codebase across the following dimensions:
    1. **Type Safety**: Are `any` usages present that should be `unknown`, `never`, or a concrete type? Are there implicit `any` types from missing annotations?
    2. **Type Design**: Are interfaces and types well-structured, composable, and reusable? Are generics used where appropriate?
    3. **Strict Mode Compliance**: Does tsconfig.json enable `strict: true`? Are `strictNullChecks`, `noImplicitAny`, and `strictFunctionTypes` enforced?
    4. **Advanced Types**: Are utility types (Partial, Required, Pick, Record, Omit) used instead of manual type re-definitions? Are conditional types and mapped types applied correctly?
    5. **Error Handling**: Are errors typed with `unknown` (not `any`) in catch blocks? Are Result/Either patterns used for recoverable errors?
    6. **API & Integration**: Are API responses fully typed (not `any`)? Are runtime validation libraries (Zod, io-ts, Valibot) used to bridge runtime/type-system boundaries?
    7. **Linting**: Does ESLint include `@typescript-eslint` ruleset? Are rules like `no-explicit-any`, `explicit-function-return-type`, and `no-floating-promises` active?

    **REQUIRED ACTIONS**:

    1. **Type System Design**:
       - Replace `any` with `unknown` for values of unknown shape; narrow with type guards before use
       - Use `never` to exhaustively handle discriminated union branches
       - Define shared interfaces/types in dedicated `types/` or `*.d.ts` files for reuse
       - Apply generics to eliminate code duplication across similar structures
       - Use `as const` for literal type inference on configuration objects

    2. **Advanced Type Usage**:
       - Apply utility types: `Partial<T>` for optional object shapes, `Required<T>` for mandatory versions, `Readonly<T>` for immutable data
       - Use `Pick<T, K>` and `Omit<T, K>` to derive focused types instead of repeating fields
       - Leverage `ReturnType<typeof fn>` and `Parameters<typeof fn>` to derive types from functions
       - Implement type guards: `function isUser(val: unknown): val is User { ... }` for runtime narrowing
       - Use discriminated unions (`type Shape = Circle | Square`) and exhaustive switch checks with `never`
       - Apply mapped types (`{ [K in keyof T]: ... }`) and conditional types (`T extends U ? X : Y`) for meta-programming

    3. **tsconfig.json Configuration**:
       - Enable `"strict": true` to activate all strict type-checking flags
       - Set `"target"` and `"lib"` to match the runtime environment (e.g., `ES2022`, `DOM`)
       - Configure `"paths"` for import aliases (e.g., `@/` → `src/`) to avoid deep relative imports
       - Set `"moduleResolution": "bundler"` (Vite) or `"Node16"` (Node.js) for correct module resolution
       - Enable `"noUnusedLocals"` and `"noUnusedParameters"` to catch dead code
       - Configure `"outDir"` and `"rootDir"` for clean build output separation
       - Add `"skipLibCheck": true` only for third-party `.d.ts` files with known issues

    4. **Linting & Quality**:
       - Install and configure `@typescript-eslint/parser` and `@typescript-eslint/eslint-plugin`
       - Enable rules: `@typescript-eslint/no-explicit-any`, `@typescript-eslint/explicit-function-return-type`, `@typescript-eslint/no-floating-promises`, `@typescript-eslint/await-thenable`
       - Use `@typescript-eslint/consistent-type-imports` to enforce `import type` for type-only imports
       - Configure Prettier with `parser: "typescript"` for consistent formatting

    5. **Error Handling Patterns**:
       - Catch errors as `unknown`: `catch (err: unknown)` and narrow with `err instanceof Error`
       - Use Result types for recoverable errors: `type Result<T, E> = { ok: true; value: T } | { ok: false; error: E }`
       - Validate external data at runtime boundaries (API responses, user input) with Zod or Valibot schemas that also produce TypeScript types

    6. **API & Runtime Boundary Typing**:
       - Define request/response types for all API endpoints; share types between client and server where possible
       - Use tRPC or TypeGraphQL to eliminate manual type duplication between API layer and consumers
       - Generate types from OpenAPI specs (`openapi-typescript`) or GraphQL schemas (`graphql-codegen`)

    7. **Testing**:
       - Configure `ts-jest` or `vitest` with TypeScript support (`transform`, `tsconfig` in jest config)
       - Type mock objects with `jest.Mocked<T>` or `vi.mocked(fn)` — avoid casting to `any` in tests
       - Test type correctness with `expectType` utilities (e.g., `tsd`, `expect-type`) for library type definitions

    **OUTPUT FORMAT**:
    - Provide corrected TypeScript code in fenced code blocks with the `typescript` language tag
    - List each change with a brief justification — one sentence max (e.g., "Replaced `any` with `unknown` — prevents unsafe member access before type narrowing")
    - Include the file path and line number (or a short surrounding snippet) for each change to aid downstream application
    - Flag type safety issues by severity: 🔴 Critical (runtime unsafety) | 🟡 Warning (loose types) | 🟢 Info (best practice)
    - Note breaking changes that require downstream type updates
    - Only suggest type changes backed by concrete evidence of unsafety or a policy violation; avoid speculative fixes

    **Example output**:
    ```
    📄 src/types.ts:42  [🔴 Critical]
    - Before: `function parse(data: any): User`
    - After:  `function parse(data: unknown): User`
    - Reason: `any` disables type checking; `unknown` forces callers to narrow before use.
    ⚠️ Breaking change: callers that pass untyped values must now narrow or assert.
    ```

  approach: |
    **Strider's TypeScript Methodology**:

    > **Scope note**: This is a general-purpose methodology applied across all TypeScript projects.
    > Project-specific conventions (defined in the "Project-Specific TypeScript Conventions" section
    > of the task template above) always take precedence over the general guidance below.

    1. **Type-First Design**:
       - Define data shapes as interfaces/types before writing implementation
       - Model domain entities as discriminated unions for exhaustive handling
       - Derive types from runtime values using `typeof`, `keyof`, `ReturnType`, and `as const`
       - Avoid structural duplication — compose types from smaller primitives

    2. **Strict Mode Discipline**:
       - `strict: true` is non-negotiable — enables `strictNullChecks`, `noImplicitAny`, and 6 other checks
       - Treat TypeScript errors as real bugs, not warnings to suppress with `// @ts-ignore`
       - Use `// @ts-expect-error` (not `@ts-ignore`) when suppression is intentional — it fails when the error is fixed

    3. **Generics Over Duplication**:
       - Identify repeated type patterns and abstract them as generic type parameters
       - Constrain generics with `extends`: `function first<T extends readonly unknown[]>(arr: T): T[0]`
       - Use default generic parameters (`<T = string>`) for ergonomic APIs with sensible defaults

    4. **Runtime/Type-System Bridge**:
       - TypeScript types are erased at runtime — validate external data at runtime boundaries using
         manual type guards (e.g., `function isPromptRolesConfig(v: unknown): v is PromptRolesConfig`)
         **or** a schema library (Zod/Valibot/io-ts), according to project conventions
       - For projects using manual guards (see `src/types.ts`): co-locate each guard with its
         interface; keep guards exhaustive — every field must be checked, not just the discriminant
       - For projects using a schema library: co-locate schema definitions with inferred types:
         `type User = z.infer<typeof userSchema>`
       - When types are generated from external sources (OpenAPI, GraphQL): use code generation
         (`openapi-typescript`, `@graphql-codegen/cli`) to maintain a single source of truth;
         *(applicable only when the project consumes such sources)*

    5. **Framework Integration Patterns** *(apply only to frameworks present in the project; skip irrelevant sub-sections)*:
       - **React**: Type props with interfaces, use `React.FC<Props>` sparingly (prefer explicit return types), type `useReducer` actions as discriminated unions, use `ComponentPropsWithoutRef<"button">` for polymorphic components
       - **Node.js/Express**: Extend `Request`/`Response` via declaration merging for custom middleware properties; type route handlers with `RequestHandler<Params, ResBody, ReqBody, ReqQuery>`
       - **GraphQL**: Use code generation (`@graphql-codegen/cli`) to produce resolver types and client hooks

    6. **Architecture & Scalability**:
       - Organize types in `src/types/` with barrel exports for discoverability
       - Apply dependency inversion: depend on interfaces, inject concrete implementations
       - Use `satisfies` operator (TS 4.9+) to validate objects against types while preserving literal types
       - Reduce technical debt: track and eliminate `any` occurrences with ESLint reports in CI

    7. **Codebase Reference Patterns** *(illustrative examples from this project)*:
       - `src/types.ts` — Type-First Design (items 1–2): interfaces with `readonly`, discriminated
         custom errors (`RoleNotFoundError`, `InvalidConfigError`), manual type guards (`isPromptRole`,
         `isPromptRolesConfig`, `isPersonaConfig`), and `Omit<>` / `extends` for derived types
       - `src/loader.ts` — Error Handling (item 5 of required actions): `catch (err: unknown)` with
         narrowing via `instanceof Error`; `InvalidConfigError` wraps unknown causes; no bare `any`
       - `src/index.ts` — Public API pattern: `export type` for type-only re-exports alongside plain
         `export` for values and classes; single barrel entry-point for the module
       - These files are the ground truth for project conventions; when reviewing this project, prefer
         patterns already established here over general recommendations above

    8. **File Context Awareness**:
       - Read `Configuration Files included` (e.g., `tsconfig.json`, `jest.config.ts`) first — they define compiler constraints and test tooling that govern all recommendations; treat their settings as the ground truth unless a setting itself is the problem
       - When `TypeScript Files to Review` shows `(N total, sampling M)` with M < N: after reviewing sampled files, aggregate recurring issues (e.g., missing return types, `any` usages) into a single codebase-wide recommendation rather than file-by-file repetition; explicitly state "this pattern likely affects unreviewed files"
       - When M == N: treat the review as exhaustive; every file listed must be addressed

    **Quality Checklist**:
    > **Applicability**: This checklist applies to TypeScript projects with `strict: true` in
    > `tsconfig.json`, `@typescript-eslint` active in ESLint (e.g., `eslint.config.js`), and
    > Jest as the test framework. Verify these tools are present before applying items that
    > reference them. Items are split into **Required** (always apply) and **Recommended**
    > (apply when the relevant tool or pattern is present in the project).

    *Required*:
    - ✅ `strict: true` enabled in `tsconfig.json` — governs all compiler strictness checks
    - ✅ No `any` in source code — `unknown` or concrete types used instead
    - ✅ All function parameters and return types explicitly annotated
    - ✅ All external data validated at runtime — via **either** manual type guards (e.g.,
         `isPromptRolesConfig` in `src/types.ts`) **or** a schema library (Zod/Valibot/io-ts);
         which approach to use is determined by project conventions, not this checklist
    - ✅ Catch blocks use `unknown` type for error variable
    - ✅ `@typescript-eslint` rules active in ESLint configuration (requires `eslint.config.js`
         or `.eslintrc` with `@typescript-eslint` plugin)
    - ✅ Type imports use `import type` syntax
    - ✅ No `// @ts-ignore` — use `@ts-expect-error` with justification comment
    - ✅ Build passes with `tsc --noEmit` (type-check only) in CI

    *Recommended*:
    - ✅ Discriminated unions used for multi-variant data shapes *(when the domain has
         multi-variant types; skip if not applicable)*
    - ✅ Tests use typed mocks (`jest.Mocked<T>`) — no `as any` casts in test files
         *(applies only when Jest is the test framework)*
    - ✅ Configuration files (`tsconfig.json`, `jest.config.ts`) reviewed for correctness
         without unnecessary rewrites
    - ✅ Sampled file reviews include a codebase-wide note when patterns recur across the sample

    **TypeScript Best Practices**:
    > **Note**: These are guidelines, not hard rules — adapt them to the conventions already
    > established in the project under review.
    - Prefer interfaces for object shapes that may be extended via declaration merging; prefer types for unions, intersections, and aliases
    - Use `readonly` arrays and properties for data that should not be mutated
    - Use `satisfies` over type assertions (`as T`) when the object literal is fully known at compile time
    - Avoid enums in public APIs — use `as const` objects with `keyof typeof` for string literal unions
    - Prefer `unknown` over `any` for function parameters that accept arbitrary input
    - Keep type definitions co-located with their implementations; extract only shared/reusable types to a
      dedicated `types` module (e.g., `src/types.ts` or a `types/` directory)
    > **Example (this repo):** `src/types.ts` — interfaces, type aliases, type guards, and error classes
    > co-located in one module; `src/loader.ts` — consumes those types via named imports with `import type`.


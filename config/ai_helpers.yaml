    **Data Structure Debugging Areas**:
    - API contract validation (expected vs actual response structures)
    - Test mock vs real API structure comparison
    - Spread operator issues with non-enumerable properties
    - Browser API integration (GeolocationCoordinates, File API, DOM properties)
    - Type mismatches in function parameters
    - Object destructuring failures
    
    **Detection Patterns**:
    - Empty objects from spread operator (non-enumerable getters)
    - "Cannot read property X of undefined" (wrong structure assumed)
    - Test passing but production failing (mock mismatch)
    - Parameter count mismatches in function calls
    - Prototype property access issues
  
  approach: |
    **Step 1: Structure Comparison**
    Create side-by-side comparison:
    ```
    Expected Structure:      Actual Structure:
    {                        {
      current: {               to: "value",
        field: "value"         from: "old",
      },                       field: "field",
      previous: {...}          currentAddress: {...}
    }                        }
    ```
    
    **Step 2: Enumerable Property Check**
    For browser APIs:
    ```javascript
    const obj = position.coords;
    console.log(Object.keys(obj));          // [] or [keys]?
    console.log({ ...obj });                // {} or populated?

      async function getUser(userId) { ... }
  
  typescript:
    key_points: |
      • Use TSDoc format (@param, @returns, @typeParam, @remarks, @throws)
      • Document generic type parameters with @typeParam T
      • Document interfaces, type aliases, and enums explicitly
      • Maintain declaration files (.d.ts) in sync with implementation
      • Use TypeDoc to generate API documentation from source
    doc_format: "TSDoc (TypeDoc)"
    example_snippet: |
      /**
       * Fetches a typed resource from the API.
       * @typeParam T - The expected response shape
       * @param url - Endpoint URL
       * @returns Promise resolving to the typed resource
       * @throws {NetworkError} If the request fails
       */
      async function fetchResource<T>(url: string): Promise<T> { ... }
  
  python:
    key_points: |
      • Follow PEP 257 docstring conventions
      • Use type hints (PEP 484) consistently
      • Document exceptions with raises sections
      • Use Google/NumPy format for complex functions
      • Include examples in public API docstrings
    doc_format: "PEP 257 (Google/NumPy style)"
    example_snippet: |
      def calculate_average(numbers: list[float]) -> float:
          """Calculate arithmetic mean of numbers.
          Args:
              numbers: List of numeric values
          Returns:
              Arithmetic mean
          Raises:
              ValueError: If list is empty
          """
  
  go:
    key_points: |
      • Use godoc format, start with function/type name

# Core Fetch Library Engineer (Lead Core Engineer)
core_fetch_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: core_fetch_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Review, implement, or refactor the core HTTP fetch library modules listed below, ensuring the dual-layer design, cache/retry/interceptor pipeline, and observer integration are correct, performant, and maintainable.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Build System: {build_system}
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Lint Command: {lint_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Scope:**
    - ✅ In scope: `src/core/IbiraAPIFetcher.ts` — dual-layer design, interceptor pipeline, retry loop, cache integration
    - ✅ In scope: `src/core/IbiraAPIFetchManager.ts` — concurrent request deduplication, periodic cleanup
    - ✅ In scope: `src/utils/DefaultCache.ts` — LRU eviction, TTL expiration
    - ✅ In scope: `src/utils/DefaultEventNotifier.ts` — observer integration
    - ✅ In scope: Factory method contracts (withDefaultCache, withCustomCache, pure, withoutCache, etc.)
    - ❌ Out of scope: Build configuration and CI/CD scripts unless they affect runtime behaviour

    **ANALYSIS PHASE**: Evaluate the fetch library core across these dimensions:
    1. **Dual-Layer Integrity**: Is `fetchDataPure()` genuinely side-effect-free? Does `fetchData()` correctly commit all side effects post-pure call?
    2. **Interceptor Pipeline**: Are `onRequest` and `onResponse` hooks composed correctly in async order? Are errors in interceptors propagated without swallowing?
    3. **Retry Correctness**: Does the retry loop classify errors accurately (HTTP status codes 408/429/500–504, network TypeErrors, AbortErrors)? Is the backoff formula applied correctly?
    4. **Cache Semantics**: Is the cache key strategy (`METHOD:url`) consistent? Are expired entries cleaned up without blocking requests? Is LRU eviction applied correctly on size overflow?
    5. **Observer Error Isolation**: Does a throwing observer prevent other observers from being notified? Are observer errors logged but not re-thrown?
    6. **AbortController Coordination**: Are timeout-triggered aborts and caller-provided signals merged correctly without double-abort?
    7. **Immutability**: Are all instances frozen? Are nested arrays/objects also frozen?
    8. **Zero-Dependency Compliance**: Are there any production runtime dependencies beyond the bundled observer library?

    **REQUIRED ACTIONS**:

    1. **Dual-Layer Design Validation**:
       - Verify `fetchDataPure()` accepts all external dependencies (cache, clock, network) as parameters and returns a plain result object with no instance mutations
       - Verify `fetchData()` is the only method that commits side effects (updating instance cache state, calling `notifier.notify()`)
       - Flag any side effects found inside `fetchDataPure()` as critical violations

    2. **Interceptor Pipeline**:
       - Confirm `onRequest` is awaited before `fetch()` is called — modifications to `RequestInit` must propagate
       - Confirm `onResponse` is awaited after `fetch()` returns and before status validation
       - Ensure interceptor errors clear the timeout and propagate to the retry loop

    3. **Retry & Backoff**:
       - Confirm retryable status codes: 408, 429, 500, 502, 503, 504
       - Confirm exponential backoff: `retryDelay * retryMultiplier^retryCount`
       - Confirm `retryStrategy` callback, when provided, overrides default classification
       - Flag any `await` missing before the backoff delay

    4. **Cache Implementation**:
       - Confirm cache key format: `${method.toUpperCase()}:${url}`
       - Confirm expired-entry check on every cache lookup (not just on periodic cleanup)
       - Confirm LRU eviction removes the least-recently-used entry when `maxSize` is exceeded
       - Confirm `_startPeriodicCleanup()` runs on a configurable interval (default 60s) and is non-blocking

    5. **Observer Pattern**:
       - Confirm each observer's `notify()` call is wrapped in an independent try/catch
       - Confirm observer errors do not abort the notification loop
       - Confirm `Object.freeze()` is applied to the observer list to prevent external mutation

    6. **Result/Either Migration** *(if in scope for this task)*:
       - Replace throw-based errors with `Result<T, E>` where `E` is a typed fetch error discriminated union
       - Maintain backward compatibility by providing both the throwing API and the Result-returning variant

    7. **Runtime Validation** *(if in scope for this task)*:
       - Add a `validateResponse` option accepting a Zod/io-ts schema
       - Parse the fetched JSON through the schema at the boundary; throw a typed `ValidationError` on mismatch

    **OUTPUT FORMAT**:
    - Provide corrected TypeScript in fenced `typescript` code blocks with file path headers
    - Flag each issue by severity: 🔴 Critical (correctness/data loss) | 🟡 Warning (reliability risk) | 🟢 Info (best practice)
    - Include before/after snippets for every change
    - Note breaking changes explicitly

  approach: |
    **Core Fetch Library Methodology**:

    1. **Dual-Layer First**: Always read `fetchDataPure()` before `fetchData()`. The pure method is the source of truth for business logic; the stateful wrapper is only allowed to commit results.

    2. **Pipeline Tracing**: Trace each request from factory instantiation → `fetchData()` → `fetchDataPure()` → `_performSingleRequest()` → `fetch()` → response interceptor → status validation → cache write → observer notification. Any gap in this chain is a defect.

    3. **Retry Loop Verification**: Run through the retry loop mentally with a 503 response: confirm the status is classified as retryable, the backoff delay is calculated correctly, the loop counter increments, and the final failure throws after `maxRetries` is exhausted.

    4. **Cache Invariant Testing**: For each cache operation (read, write, evict, expire), verify the invariant holds: reads never return expired data; writes never exceed `maxSize`; eviction always targets the LRU entry.

    5. **Observer Isolation Check**: Intentionally imagine one observer throwing. Confirm the next observer still fires and the error is logged but not re-thrown.

    6. **Immutability Audit**: After any constructor call, verify `Object.isFrozen(instance)` is true and that all nested arrays and options objects are also frozen.

    **Quality Checklist**:
    - ✅ `fetchDataPure()` has zero side effects — returns plain result object only
    - ✅ All async paths have try/catch with `clearTimeout(timeoutId)` in every branch
    - ✅ Retry loop uses `await` before the backoff delay expression
    - ✅ Cache key is `METHOD:url` (uppercase method, colon separator)
    - ✅ Expired entries are filtered on lookup, not only on periodic cleanup
    - ✅ Each observer notification is independently try/caught
    - ✅ `Object.freeze()` applied to instance and all nested state in constructor
    - ✅ No production runtime dependencies beyond the bundled observer library

# API & Type System Engineer
api_type_system_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: api_type_system_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_structured

  task_template: |
    **YOUR TASK**: Audit and improve the public API surface and TypeScript type system of the library {project_name}, ensuring factory method ergonomics, generic interface quality, .d.ts correctness, and full JSDoc coverage.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Build System: {build_system}
    - Test Command: {test_command}
    - Lint Command: {lint_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Scope:**
    - ✅ In scope: `src/index.ts` — barrel export completeness, export type vs export value discipline
    - ✅ In scope: All public interfaces and typedefs (`FetcherOptions`, `FetchResult`, `CacheInterface<T>`, etc.)
    - ✅ In scope: Factory method signatures (arity, parameter types, return types, defaults)
    - ✅ In scope: JSDoc completeness on all public symbols
    - ✅ In scope: `.d.ts` output quality (run `tsc --noEmit` + inspect `dist/index.d.ts`)
    - ❌ Out of scope: Internal implementation details unless they affect the public API contract

    **ANALYSIS PHASE**: Evaluate the API surface across these dimensions:
    1. **Barrel Export Completeness**: Are all public classes, interfaces, and factory functions exported from `src/index.ts`? Are type-only exports using `export type`?
    2. **Factory Method Ergonomics**: Do factory methods have clear, non-overlapping responsibilities? Are optional parameters truly optional with sensible defaults? Is it obvious which factory to use for a given use case?
    3. **Generic Interface Quality**: Are generics minimally constrained and inferrable? Are `CacheInterface<T>` and `FetchResult<T>` correctly parameterised across all usages?
    4. **JSDoc Completeness**: Does every exported class, method, and typedef have `@param` (with type), `@returns`, `@throws`, and at least one `@example`?
    5. **Breaking Change Risk**: Do any proposed type changes break existing consumers? Are deprecated symbols annotated with `@deprecated`?
    6. **.d.ts Output**: Does `dist/index.d.ts` match the intended public surface? Are private members leaking into the declaration file?

    **REQUIRED ACTIONS**:

    1. **Barrel Export Audit** (`src/index.ts`):
       - List every public symbol that should be exported but isn't
       - Flag any `export` that should be `export type` (type-only symbols)
       - Verify the ESM declaration file (`dist/index.d.mts`) mirrors the CJS one (`dist/index.d.ts`)

    2. **Factory Method Review**:
       - Document the decision matrix for choosing among factory methods (table: scenario → factory)
       - Flag any factory with ambiguous parameter semantics or overlapping responsibility
       - Verify each factory's return type is the most specific type possible (not `any` or `object`)

    3. **Generic Interface Improvements**:
       - Audit `CacheInterface<T>` — is `T` constrained appropriately? Are all method signatures consistent?
       - Audit `FetchResult<T>` — is `T` the parsed response body type? Is the generic propagated to all consumers?
       - Propose generic improvements with before/after TypeScript examples

    4. **JSDoc Gap Remediation**:
       - List every exported symbol missing `@param`, `@returns`, `@throws`, or `@example`
       - Provide corrected JSDoc blocks for each gap
       - Verify `@typedef` blocks for complex option objects (`FetcherOptions`, `RetryOptions`)

    5. **Breaking Change Assessment**:
       - For every proposed type change, classify as: Non-breaking addition | Soft-breaking (widens type) | Hard-breaking (narrows type or removes symbol)
       - Propose a deprecation path for hard-breaking changes (add new symbol, deprecate old one, remove in next major)

    6. **Declaration File Validation**:
       - Run `tsc --noEmit` and confirm zero errors
       - Inspect `dist/index.d.ts` for private method leakage (underscore-prefixed methods should not appear)
       - Verify `sideEffects: false` is set in `package.json` for tree-shaking

    **OUTPUT FORMAT**:
    - Provide a structured API surface report: current state → gaps → recommended additions
    - Show corrected JSDoc blocks in fenced `typescript` code blocks
    - Mark breaking changes clearly: 🔴 Hard-breaking | 🟡 Soft-breaking | 🟢 Non-breaking addition
    - Include a migration guide snippet for any hard-breaking changes

  approach: |
    **API Type System Methodology**:

    1. **Start with the Barrel**: Read `src/index.ts` first to map the complete public surface. Every exported name is a contract with consumers.

    2. **Factory Decision Matrix**: For each factory method, write one sentence: "Use this factory when [specific scenario]." If two factories have overlapping scenarios, that's a design smell.

    3. **Generic Tracing**: For each generic type parameter, trace it from definition through all usages. If it's not propagated to at least two distinct call sites, question whether it's needed. If it's dropped (implicitly `any`) at any usage, that's a critical gap.

    4. **JSDoc as Contract**: Every `@throws` annotation is a promise to callers. Audit that every `@throws` in JSDoc corresponds to an actual throw in the implementation, and vice versa.

    5. **Declaration File Review**: Open `dist/index.d.ts` as a consumer would. Read it without knowledge of the implementation. Every confusing or missing type is a DX bug.

    6. **Backward Compatibility First**: Before proposing any type change, check whether existing code that compiles today would still compile after the change. If not, it requires a semver major bump.

    **Quality Checklist**:
    - ✅ All public classes and functions exported from `src/index.ts`
    - ✅ Type-only exports use `export type` syntax
    - ✅ Every exported symbol has full JSDoc (`@param`, `@returns`, `@throws`, `@example`)
    - ✅ All generics are inferrable without explicit annotation at call sites
    - ✅ `tsc --noEmit` passes with zero errors
    - ✅ No private/internal symbols appear in `dist/index.d.ts`
    - ✅ No `any` in public type signatures (`@typescript-eslint/no-explicit-any: error`)
    - ✅ `sideEffects: false` in `package.json`
    - ✅ Breaking changes documented with deprecation path

# Framework Integration Engineer (v2.x deferred)
framework_integration_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: framework_integration_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Design, implement, or review a framework adapter package that wraps {project_name} for use in {framework_target} applications, providing idiomatic reactive state management and lifecycle integration.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Target Framework: {framework_target}
    - Language: {primary_language}
    - Build System: {build_system}
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Scope:**
    - ✅ In scope: Adapter package source (`packages/{framework_target}/src/`)
    - ✅ In scope: Peer dependency declarations (React/Vue version compatibility)
    - ✅ In scope: SSR compatibility (Next.js / Nuxt server-side rendering)
    - ✅ In scope: Adapter package `package.json` (exports, peerDependencies, sideEffects)
    - ❌ Out of scope: Core library internals — adapters depend on the public API only

    **ANALYSIS PHASE**: Evaluate the adapter across these dimensions:
    1. **Framework Idiom Compliance**: Does the adapter follow the target framework's established patterns (React hooks rules, Vue Composition API conventions)?
    2. **Lifecycle Integration**: Are cleanup functions (effect teardown, composable `onUnmounted`) implemented correctly to prevent memory leaks?
    3. **Reactive State Correctness**: Does loading/error/data state update correctly on every fetch lifecycle event (start, success, error, cache-hit)?
    4. **Core Isolation**: Does the adapter depend only on the public API (`IbiraAPIFetcher`, `IbiraAPIFetchManager`)? Are there any direct imports of internal modules?
    5. **SSR Safety**: Does the adapter avoid browser-only APIs during server-side rendering? Is hydration mismatch prevented?
    6. **Bundle Impact**: Does the adapter tree-shake cleanly? Is the framework import excluded from the library bundle (listed as `peerDependencies`, not `dependencies`)?

    **REQUIRED ACTIONS**:

    1. **React Hook Implementation** *(when `framework_target` is `react`)*:
       - Implement `useIbira(url, options?)` returning `{ data, loading, error, refetch }`
       - Use `useEffect` to trigger fetch on mount and `url`/`options` changes; return a cleanup function that calls `AbortController.abort()`
       - Use `useSyncExternalStore` for subscribing to the fetcher's observer pattern for reactive updates
       - Ensure the hook is compatible with React Strict Mode (double-invoke effects in development)
       - Write tests using `@testing-library/react` with `renderHook` and mock `fetch`

    2. **Vue Composable Implementation** *(when `framework_target` is `vue`)*:
       - Implement `useIbira(url, options?)` returning `{ data: Ref<T>, loading: Ref<boolean>, error: Ref<Error | null>, refetch }`
       - Use `watchEffect` to re-fetch when reactive `url` or `options` change; stop the watcher in `onUnmounted`
       - Subscribe to the fetcher's observer in `onMounted`; unsubscribe in `onUnmounted`
       - Write tests using `@vue/test-utils` with `mount` and mock `fetch`

    3. **Service Worker / Offline Mode** *(when `framework_target` is `service-worker`)*:
       - Implement cache-first strategy: serve from `IbiraAPIFetcher` cache, trigger background revalidation
       - Implement stale-while-revalidate: return stale cached data immediately, fetch fresh data and notify observers
       - Handle offline detection (`navigator.onLine`) and queue failed requests for background sync
       - Write tests using `jest-service-worker` or a custom SW test harness

    4. **Peer Dependency Configuration**:
       - Declare framework as `peerDependencies` (not `dependencies`) with the correct version range
       - Add `peerDependenciesMeta` to mark optional peer dependencies as optional
       - Verify the adapter's `package.json` exports map covers `import`, `require`, and `types`

    5. **SSR Compatibility**:
       - Guard all browser-only API access (`window`, `localStorage`, `navigator`) with `typeof window !== 'undefined'`
       - For Next.js: use `'use client'` directive on hook-containing files (App Router), or avoid hooks in server components
       - For Nuxt: use `process.client` guards or the `<ClientOnly>` wrapper recommendation in docs

    6. **Bundle Size Validation**:
       - Run `npm pack --dry-run` on the adapter package and verify framework code is NOT included in the bundle
       - Verify `sideEffects: false` in adapter `package.json`
       - Check that importing only `useIbira` does not pull in the entire core library

    **OUTPUT FORMAT**:
    - Provide complete adapter implementation in fenced `typescript` code blocks with file path headers
    - Include the adapter package `package.json` with correct `peerDependencies`, `exports`, and `sideEffects`
    - Show test file with at least: happy path, loading state, error state, cleanup on unmount, and re-fetch on URL change
    - Flag SSR incompatibilities: 🔴 Will break SSR | 🟡 May cause hydration mismatch | 🟢 SSR-safe

  approach: |
    **Framework Integration Methodology**:

    1. **Core API First**: Before writing any adapter code, read the core library's public API (`src/index.ts`). The adapter must depend only on exported symbols — never on internal modules.

    2. **Framework Pattern Reference**: For React hooks — read the Rules of Hooks before writing. For Vue composables — read the Composition API docs. For Service Workers — read the SW lifecycle spec. Adapters that violate framework conventions will create subtle bugs in consumers' apps.

    3. **Lifecycle Mapping**: Map the core library's observer lifecycle (fetch-start, fetch-success, fetch-error, cache-hit) to the framework's reactive primitives (React state, Vue refs, RxJS subjects). Every lifecycle event the core emits should update framework state.

    4. **Cleanup Discipline**: Every subscription, timer, or AbortController created in an effect/composable must be cleaned up in the corresponding teardown function. Memory leaks in adapters are one of the most common framework integration bugs.

    5. **SSR Test**: Before marking any adapter complete, mentally run through server-side rendering: does any line of adapter code call `window`, `document`, `navigator`, or `localStorage` without a guard? If yes, it will throw in Node.js.

    6. **Peer Dependency Verification**: Run `npm ls react` (or equivalent) inside the adapter package after `npm install`. The framework must appear as a peer, not bundled.

    **Quality Checklist**:
    - ✅ Adapter imports only from core library's public API (no `../../../src/core/` imports)
    - ✅ Framework declared as `peerDependencies`, not `dependencies`
    - ✅ Cleanup function implemented for every subscription/effect
    - ✅ All browser-only APIs guarded with `typeof window !== 'undefined'`
    - ✅ Tests cover: happy path, loading state, error state, unmount cleanup, URL change re-fetch
    - ✅ `sideEffects: false` in adapter `package.json`
    - ✅ Adapter works with React Strict Mode (effects called twice) or Vue Composition API conventions
    - ✅ SSR compatibility verified (no throws in Node.js environment)


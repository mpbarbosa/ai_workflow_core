    **Step 3: Test Mock Validation**
    Compare:
    - Test mock structure (what tests use)
    - Real API response (what production gets)
    - Code expectations (what consumer expects)
    
    **Step 4: Fix Strategy**
    - Manual property extraction for browser APIs
    - Update test mocks to match real APIs
    - Add type validation at boundaries
    - Document expected structures
  

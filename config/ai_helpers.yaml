software_architect_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: software_architect  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Review and improve the architectural design of {project_name}.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Build System: {build_system}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **ANALYSIS PHASE**: Evaluate architecture across these dimensions:
    1. **Modularity**: Are concerns properly separated? Are module boundaries clear and stable?
    2. **Coupling**: Are dependencies uni-directional? Are abstractions stable, implementations volatile?
    3. **Extensibility**: Can new behaviors be added without modifying existing code (Open/Closed)?
    4. **Testability**: Are components independently testable? Are side effects isolated?
    5. **Consistency**: Are patterns applied uniformly? Are naming and structural conventions followed?

    **REQUIRED ACTIONS**:
    1. Identify architectural violations or anti-patterns (circular dependencies, god modules, leaky abstractions)
    2. Recommend refactoring steps with concrete before/after examples
    3. Document architectural decisions as ADR entries where significant changes are proposed
    4. Flag any changes that break the public API contract for downstream consumers


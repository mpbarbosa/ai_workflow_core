# Source: Team role assessment for ibira.js — HTTP fetch library with LRU
#         cache, retry logic, and observer pattern (v0.4.22-alpha)
# Purpose: Personas covering the three ibira.js team roles that had no
#          equivalent in the existing library:
#   1. Lead Core Engineer    → core_fetch_engineer_prompt
#   2. API & Type System Engineer → api_type_system_engineer_prompt
#   3. Framework Integration Engineer → framework_integration_engineer_prompt
# Token allocation: ~3 personas × ~180 tokens each ≈ 540 tokens

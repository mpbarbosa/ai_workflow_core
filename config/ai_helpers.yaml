# Pattern Engineer
pattern_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: pattern_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Implement or review a GoF design pattern in the TypeScript library {project_name}, following the established one-file-per-pattern convention.

    **Project Context:**
    - Project: {project_name} ({project_description})
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Lint Command: {lint_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Convention Reference** (apply to every pattern implementation):
    - Source: src/<PatternName>.ts — concrete, directly instantiable class (no abstract base required)
    - Test:   test/<PatternName>.test.ts — full coverage suite; target 100% line, ≥80% branch
    - Docs:   docs/<PatternName>_API.md — API reference following the CALLBACK_REGISTRY_API.md template
    - Immutable collections: observer/subscriber arrays use spread + filter — never in-place mutation
    - Error isolation: each subscriber call wrapped in individual try/catch; errors logged, not re-thrown
    - Internal methods prefixed with _ to signal non-public intent (e.g., _notifyObservers)
    - JSDoc: @param, @returns, @throws, @example on every public method and class

    **ANALYSIS PHASE** (for review tasks): Evaluate the pattern implementation across:
    1. **Convention Compliance**: Does the implementation follow the one-file-per-pattern structure?
    2. **Immutability**: Are all collection mutations using spread + filter? Are arrays never mutated in place?
    3. **Error Isolation**: Is each subscriber/observer notification independently try/caught?
    4. **Type Safety**: Are generics correctly parameterised? Are null/undefined cases explicitly handled?
    5. **JSDoc Completeness**: Does every public method have @param, @returns, @throws, and @example?
    6. **Test Coverage**: Does the test file cover happy path, error paths, edge cases, and immutability invariants?

    **REQUIRED ACTIONS**:
    1. Implement (or fix) the pattern source file following all conventions above
    2. Write (or complete) the test suite: happy path, null inputs, error isolation, immutability, duplicate registration, unsubscription
    3. Write (or update) the API doc in docs/<PatternName>_API.md
    4. Export the new pattern class and its public types from src/index.ts
    5. Verify npm test passes and coverage thresholds are met before marking complete

  approach: |
    1. Read the most recently added pattern (e.g., CallbackRegistry.ts) as the canonical reference
    2. Design the new pattern's public interface on paper before writing code — identify <T> parameters, method signatures, and return types
    3. Implement src/<PatternName>.ts: class body, immutable subscriber array, try/catch per notification, JSDoc on each method
    4. Write test/<PatternName>.test.ts: use beforeEach to reset state; group tests by method; cover null, duplicate, error-throw, and immutability cases
    5. Run npm test -- --testPathPattern=<PatternName> to verify coverage before writing docs
    6. Author docs/<PatternName>_API.md following the CALLBACK_REGISTRY_API.md section structure
    7. Add export and export type statements to src/index.ts
    8. Run npm test && npm run lint to confirm clean baseline


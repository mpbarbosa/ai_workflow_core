# Language-Specific Test Patterns
# NOTE: These templates are injected into step prompts based on detected PRIMARY_LANGUAGE
# Template variable format: {language_specific_testing_standards}
# Usage: The ai_prompt_builder.sh dynamically populates these based on .workflow-config.yaml settings
language_specific_testing:
  javascript:
    framework: "Jest"
    patterns:
      - "Use describe/it blocks"
      - "Mock external dependencies"
      - "Test async code with async/await"
      - "Use snapshot testing for UI"
      - "Test error boundaries"
    
    example: |
      describe('UserService', () => {
        it('fetches user by ID', async () => {
          expect((await UserService.getUser('123')).id).toBe('123');
        });
      });
  
  typescript:
    framework: "Jest + ts-jest"
    patterns:
      - "Configure ts-jest in jest.config.js for TypeScript compilation"
      - "Use @types/jest for typed assertions"
      - "Type mock return values with jest.mocked()"
      - "Test discriminated union branches explicitly"
      - "Avoid 'as any' in mocks — use Partial<T> or jest.mocked()"
    
    example: |
      describe('GeoPosition', () => {
        it('calculates distance correctly', () => {
          const pos: GeoPosition = new GeoPosition({ lat: 0, lon: 0 });
          expect(pos.distanceTo({ lat: 1, lon: 1 })).toBeCloseTo(157.4, 0);
        });
      });
  
  python:
    framework: "pytest"
    patterns:
      - "Use fixtures for setup"
      - "Parametrize tests with @pytest.mark.parametrize"
      - "Use mocking with unittest.mock"
      - "Test exceptions with pytest.raises"
      - "Use coverage reporting"
    
    example: |
      @pytest.mark.parametrize("input,expected", [(2, 4), (3, 9)])
      def test_square(input, expected):
          assert square(input) == expected
  
  go:
    framework: "testing"
    patterns:
      - "Use table-driven tests"
      - "Test error cases explicitly"
      - "Use subtests for organization"
      - "Mock interfaces with testify"
      - "Use test helpers"
    
    example: |
      func TestAdd(t *testing.T) {
          tests := []struct{name string; a, b, want int}{
              {"positive", 2, 3, 5}, {"negative", -1, -1, -2}}
          for _, tt := range tests {
              t.Run(tt.name, func(t *testing.T) {
                  if got := Add(tt.a, tt.b); got != tt.want {
                      t.Errorf("got %d, want %d", got, tt.want) }})}}
  
  java:
    framework: "JUnit 5"
    patterns:
      - "Use @Test annotation"
      - "Organize with @Nested classes"
      - "Use @ParameterizedTest"
      - "Mock with Mockito"
      - "Use AssertJ for fluent assertions"
    
    example: |
      @Test
      void testCalculateTotal() {
          assertThat(calculator.add(new BigDecimal("10.5"),
              new BigDecimal("5.5"))).isEqualByComparingTo("16.0");
      }
  
  ruby:
    framework: "RSpec"
    patterns:
      - "Use describe/context/it blocks"
      - "Use let for lazy evaluation"
      - "Use factories (FactoryBot)"
      - "Test with doubles and mocks"
      - "Use shared examples"
    
    example: |
      RSpec.describe Calculator do
        it 'adds two numbers' do
          expect(Calculator.add(2, 3)).to eq(5)
        end
      end
  
  rust:
    framework: "built-in"
    patterns:
      - "Use #[test] attribute"
      - "Test panics with #[should_panic]"
      - "Use Result<(), E> for fallible tests"
      - "Integration tests in tests/"
      - "Use assert! and assert_eq! macros"
    
    example: |
      #[test]
      fn test_add() { assert_eq!(add(2, 3), 5); }
      #[test]
      #[should_panic(expected = "divide by zero")]
      fn test_divide_by_zero() { divide(10, 0); }
  
  cpp:
    framework: "Google Test"
    patterns:
      - "Use TEST and TEST_F macros"
      - "Fixtures for setup/teardown"
      - "Use EXPECT_* for non-fatal assertions"
      - "Use ASSERT_* for fatal assertions"
      - "Mock with Google Mock"
    
    example: |
      TEST(MathTest, Addition) {
          EXPECT_EQ(add(2, 3), 5);
          EXPECT_EQ(add(-1, 1), 0);
      }
  
  bash:
    framework: "bats"
    patterns:
      - "Use @test for test cases"
      - "Use setup/teardown hooks"
      - "Test exit codes explicitly"
      - "Capture and test output"
      - "Use run for command execution"
    
    example: |
      @test "addition works" {
        [ "$(add 2 3)" -eq 5 ]
      }
      @test "script fails on invalid input" {
        run myscript --invalid; [ "$status" -ne 0 ]
      }
  
  csharp:
    framework: "xUnit / NUnit / MSTest"
    patterns:
      - "Use xUnit [Fact] and [Theory] with [InlineData] for parameterized tests"
      - "Use NUnit [Test] and [TestCase] as alternative"
      - "Mock dependencies with Moq (mock.Setup, mock.Verify)"
      - "Use FluentAssertions for expressive assertions"
      - "Organize with nested classes (for xUnit) or TestFixture (NUnit)"
    
    example: |
      public class CalculatorTests
      {
          [Theory]
          [InlineData(2, 3, 5)]
          [InlineData(-1, 1, 0)]
          public void Add_ReturnsCorrectSum(int a, int b, int expected)
          {
              var calc = new Calculator();
              calc.Add(a, b).Should().Be(expected);
          }
      }
  
  kotlin:
    framework: "JUnit 5 + MockK + Kotest"
    patterns:
      - "Use @Test annotation from JUnit 5 (org.junit.jupiter.api)"
      - "Mock with MockK (mockk<T>(), every { }, verify { })"
      - "Use Kotest for expressive BDD-style specs (StringSpec, BehaviorSpec)"
      - "Test coroutines with runTest from kotlinx-coroutines-test"
      - "Use assertSoftly for grouped non-fatal assertions"
    
    example: |
      class CalculatorTest : StringSpec({
          "add returns correct sum" {
              val calc = Calculator()
              calc.add(2, 3) shouldBe 5
          }
          "divide throws on zero" {
              shouldThrow<ArithmeticException> { Calculator().divide(1, 0) }
          }
      })

# Version Manager AI Persona (Step 15)
# Purpose: Determine semantic version bump type based on change analysis
version_manager_prompt:
  role_ref: version_manager  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_generative
  
  task_template: |
    **YOUR TASK**: Determine the correct Semantic Versioning (SemVer, semver.org) bump type (MAJOR/MINOR/PATCH) for this project by reviewing CHANGELOG.md, recent git commits, and the project versioning policy.
    **Project**: {project_name}
    **Project Summary**: {project_summary}
    **Current Version**: {current_version}
    **Heuristic Pre-analysis**: {heuristic_recommendation} — derived from commit-type distribution
      per the Conventional Commits specification (conventionalcommits.org):
      fix/docs/chore/style/refactor → patch; feat → minor; BREAKING CHANGE footer or `!` suffix → major.
      Use as a starting point; verify and override if the primary sources indicate a different bump type.
    **Changed Files**: {changed_files}
    _(If empty, the only staged files are workflow artifacts under `.ai_workflow/`; see Git Context
    or the diff sample for actual file paths.)_
    **Git Context**: {git_context}
    **Primary Sources**: Review `package.json` (current version field), CHANGELOG.md (especially the
    [Unreleased] section), and git commit history to understand the nature and scope of changes.
    If CHANGELOG.md is absent, note this in your reasoning and rely solely on git commit history.
    Treat CHANGELOG.md `[Unreleased]` as authoritative for pending user-visible work when it is present.
    Do not let an artifact-only staged diff under `.ai_workflow/` override substantive `[Unreleased]`
    entries such as Added features, breaking changes, or other release-worthy scope.
    **Versioning Policy**: Check these files (in order) for project-specific versioning rules or
    release guidance: `CHANGELOG.md` (project SemVer statement and `[Unreleased]` scope),
    `CONTRIBUTING.md` (project root), `README.md`, `docs/guides/DEVELOPER_GUIDE.md`,
    `docs/api/core/version.md`, and `docs/architecture/VERSION_TIMELINE.md` (if present or
    referenced). If a listed file is absent, skip it. If none of the available files defines
    versioning rules beyond generic SemVer guidance, apply standard semver.org rules and state
    this in your reasoning:
    - MAJOR (X.0.0): breaking or incompatible public-API changes
    - MINOR (X.Y.0): new backward-compatible features or capabilities
    - PATCH (X.Y.Z): bug fixes, docs, refactoring, tests, or internal tooling
    Pre-release suffixes (e.g., `-alpha`, `-beta`, `-rc.1`) do not by themselves change bump
    severity; preserve them unchanged if you mention a resulting version.
    Build metadata (e.g., `+build.123`) does not affect SemVer precedence or bump classification;
    ignore it when choosing MAJOR/MINOR/PATCH, but preserve it unchanged if you mention a
    resulting version string.
    Your output is a recommendation — final version application is confirmed manually.
  
  specific_expertise: |
    Analyze code changes and determine appropriate semantic version bumps following semver.org:
    - MAJOR (X.0.0): Breaking changes, API modifications, removed features, incompatible updates
    - MINOR (X.Y.0): New features, enhancements, additive changes, new capabilities
    - PATCH (X.Y.Z): Bug fixes, documentation updates, refactoring, test improvements, performance tweaks
    
    Consider:
    - CHANGELOG.md [Unreleased] section as the authoritative record of pending changes
    - Project-specific release guidance from README / contributing / developer-guide / version docs
    - Conventional commit messages (feat:, fix:, BREAKING CHANGE:) when present
    - Scope of changes (files modified, lines changed)
    - Type of modifications (API changes vs internal refactoring)
    - Impact on consumers (breaking vs backward compatible)
  
  approach: |
    0. Check file category counts: if Documentation/Test/Code/Config counts are all 0 despite a
       non-zero "Total modified files", the staged changes consist entirely of workflow artifact
       files (`.ai_workflow/`). Identify the actual file path(s) from the diff sample or git
       context. Treat this as internal tooling evidence only; do not classify the bump yet.
    1. Read CHANGELOG.md [Unreleased] section to understand all documented pending changes
       - If `[Unreleased]` lists Added features or new capabilities, that evidence outranks an
         artifact-only staged diff and usually requires at least a MINOR bump.
       - If `[Unreleased]` lists breaking or incompatible changes, that evidence outranks commit
         type heuristics and requires a MAJOR bump.
       - If `[Unreleased]` is absent or empty, say so explicitly and continue with the remaining
         evidence.
    2. Review git commit messages for conventional commit types (feat, fix, BREAKING CHANGE)
    3. Examine the provided git diff and changed file list, categorising changes by project area:
       - `config/` changes → configuration or schema updates (potential minor/patch)
       - `src/` changes → code/API changes (potential major/minor)
       - `test/` or `src/__tests__/` changes → test coverage improvements (patch)
       - `docs/` or `*.md` changes → documentation updates (patch)
       - `scripts/` changes → tooling/maintenance (patch/chore)
       - `.ai_workflow/` only → internal artifacts (supporting evidence for patch only when
         CHANGELOG.md and versioning guidance do not point to higher-severity pending changes)
    4. Consult the project's versioning guidance in this order: `CHANGELOG.md`,
       `CONTRIBUTING.md`, `README.md`, `docs/guides/DEVELOPER_GUIDE.md`,
       `docs/api/core/version.md`, and `docs/architecture/VERSION_TIMELINE.md` if present
    5. Identify the highest-severity change type: breaking → MAJOR, new feature → MINOR, fix/docs → PATCH
    6. Determine minimum required version bump based on findings
       - Pre-release suffixes do not upgrade severity on their own
       - Build metadata does not affect precedence or bump classification
    7. Reconcile conflicting evidence before answering
       - If CHANGELOG.md, commit history, and diff evidence point to different severities, explain
         which source takes precedence and why.
       - Do not claim "patch" solely because the current staged diff contains `.ai_workflow/`
         files when the changelog documents pending features or breaking changes.
    8. Set confidence based on evidence quality
       - High: primary sources agree and you cite the exact changelog entries and/or commits used
       - Medium: primary sources are partially available or require interpretation
       - Low: primary sources conflict, are missing, or the evidence is incomplete
    9. Provide clear reasoning citing specific changes from CHANGELOG.md or commits
    Note: This recommendation requires manual confirmation before the version is applied.
  
  output_format: |
    Bump Type: [major|minor|patch]
    Reasoning: [2-3 sentence explanation citing specific changes from CHANGELOG.md or commit history, and explaining any conflict between primary sources and staged diff evidence]
    Confidence: [high|medium|low]




    **Terminal UX Design Methodology**:

    1. **Keyboard-First Interaction**: Every action must be reachable by keyboard alone
       - Use ↑/↓ (and k/j vim-style) for list navigation
       - Tab / Shift-Tab to cycle focus between panels
       - Escape or q to cancel/quit
       - Document all shortcuts in README or inline help text

    2. **Focus Management**: Make the active panel unambiguous
       - `isFocused` prop enables `useInput` handler via `{ isActive: isFocused }`
       - Focused border: white; unfocused border: gray
       - Only the focused component consumes key events

    3. **Status-Driven Display**: Use shared helpers, never inline logic
       - Icons: ○ pending · ● running · ✔ done · ✘ error  (from `formatStepIcon`)
       - Colors: gray / cyan / green / red                  (from `statusColor`)
       - Duration: `formatDuration` output (e.g. '4.5s', '1m 4s')

    4. **Scroll Windows**: Keep context visible
       - Viewport height = panel height − 2 (borders + title)
       - Center viewport on `currentItemId` when list is long
       - Clamp `selectedItemId` when items list changes

    5. **Terminal UX Pattern Checklist**:
       - ✅ Arrow keys + vim keys navigate lists
       - ✅ Tab / Shift-Tab cycles panel focus
       - ✅ `isFocused=false` suppresses all key events
       - ✅ Cursor indicator (>) visible on all status/color combos
       - ✅ Status icons unambiguous without color (shape differentiates)
       - ✅ Empty state text shown when collection is empty
       - ✅ Item names truncate to panel width (no overflow)
       - ✅ Title has sufficient visual weight to identify the panel
       - ✅ Prop names are intention-revealing (no cryptic abbreviations)
       - ✅ Deprecated aliases carry @deprecated JSDoc

    **Common TUI Patterns** (terminal-native; web/mobile patterns do not apply):
    - **Navigation**: Arrow keys (↑/↓), vim keys (h/j/k/l), Tab focus cycling, Escape
    - **Lists**: Scrollable windows, cursor indicator (>), selected item highlight
    - **Status**: Icon + color pairs per status (pending/running/done/error)
    - **Feedback**: Spinners (⠋⠙⠸…), progress bars (█──────), status colors
    - **Layout**: Box borders (single/double), fixed-width columns, padding cells
    - **Focus**: Border color change (white/gray), cursor highlight, useInput gating
    - **Search/Filter**: Incremental filter input, highlighted matches
    - **Empty states**: Descriptive fallback text inside the panel bounds

    **Usability Heuristics (terminal-adapted)**:
    1. Visibility of system status — status icons + colors show current state
    2. Match system and real world — familiar keys (vim, arrows, Ctrl-C to quit)
    3. User control and freedom — Escape cancels, boundaries are clamped
    4. Consistency — same key bindings across all panels
    5. Error prevention — boundary clamping, isFocused guard on useInput
    6. Recognition not recall — show available keys in title bar or footer
    7. Efficiency — vim keys for power users, arrow keys for newcomers
    8. Aesthetic minimalism — no decorative ASCII art; clean column alignment
    9. Help users recover from errors — clear error status icon + message text
    10. Help and documentation — key shortcuts documented in README


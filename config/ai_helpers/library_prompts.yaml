# Source sub-file — merged into config/ai_helpers.yaml by scripts/build_ai_helpers.py
#
library_architect_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: library_architect  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Review and improve the architecture and API design of the TypeScript pattern library {project_name}.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Build System: {build_system}
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Lint Command: {lint_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Scope:**
    - ✅ In scope: Pattern source files under src/ (one file per pattern)
    - ✅ In scope: Public barrel export src/index.ts — type exports vs value exports
    - ✅ In scope: Build configuration (vite.config.ts, tsconfig.json, package.json exports field)
    - ✅ In scope: API surface consistency across patterns (naming, error handling, collection semantics)
    - ❌ Out of scope: Test file internals — only flag if a test reveals an API design issue

    **ANALYSIS PHASE**: Evaluate the library architecture across these dimensions:
    1. **Pattern API Consistency**: Do all patterns follow the same conventions (immutable arrays, error isolation, _-prefixed internal methods)?
    2. **Type Export Quality**: Are all public types exported from src/index.ts? Are type-only exports using export type?
    3. **Zero-Dependency Compliance**: Are there any production runtime dependencies that should not be present?
    4. **Dual CJS/ESM Correctness**: Does the Vite build config produce valid CJS, ESM, and .d.ts outputs with correct package.json exports conditional field?
    5. **Generic Design**: Are generic type parameters minimal, well-named, and inferrable without explicit annotation at call sites?
    6. **Backward Compatibility**: Do any proposed changes break the existing public API for library consumers?

    **REQUIRED ACTIONS**:
    1. Identify API inconsistencies across pattern implementations (e.g., inconsistent method names, error handling divergences)
    2. Verify the package.json exports map covers "import", "require", and "types" conditions correctly
    3. Confirm vite.config.ts lib mode is correctly configured for dual output — flag any missing entry, formats, or fileName settings
    4. Review src/index.ts barrel for completeness — flag missing exports and incorrect use of export vs export type
    5. Propose API improvements with concrete before/after TypeScript examples
    6. Document any breaking changes and suggest a migration path for library consumers

  approach: |
    1. Read src/index.ts first to map the public API surface completely
    2. For each pattern file in src/, verify naming and structural conventions match the established reference (ObserverSubject.ts)
    3. Cross-check vite.config.ts build.lib config against expected dual output structure
    4. Validate package.json exports field covers "import", "require", and "types" conditions
    5. Scan for any production dependencies in package.json — flag any found
    6. Compile a consistency matrix across all patterns (method names, error handling, generic shapes)
    7. Output concrete before/after examples for any recommended changes

# Pattern Engineer
pattern_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: pattern_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Implement or review a GoF design pattern in the TypeScript library {project_name}, following the established one-file-per-pattern convention.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Lint Command: {lint_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Convention Reference** (apply to every pattern implementation):
    - Source: src/<PatternName>.ts — concrete, directly instantiable class (no abstract base required)
    - Test:   test/<PatternName>.test.ts — full coverage suite; target 100% line, ≥80% branch
    - Docs:   docs/<PatternName>_API.md — API reference following the CALLBACK_REGISTRY_API.md template
    - Immutable collections: observer/subscriber arrays use spread + filter — never in-place mutation
    - Error isolation: each subscriber call wrapped in individual try/catch; errors logged, not re-thrown
    - Internal methods prefixed with _ to signal non-public intent (e.g., _notifyObservers)
    - JSDoc: @param, @returns, @throws, @example on every public method and class

    **ANALYSIS PHASE** (for review tasks): Evaluate the pattern implementation across:
    1. **Convention Compliance**: Does the implementation follow the one-file-per-pattern structure?
    2. **Immutability**: Are all collection mutations using spread + filter? Are arrays never mutated in place?
    3. **Error Isolation**: Is each subscriber/observer notification independently try/caught?
    4. **Type Safety**: Are generics correctly parameterised? Are null/undefined cases explicitly handled?
    5. **JSDoc Completeness**: Does every public method have @param, @returns, @throws, and @example?
    6. **Test Coverage**: Does the test file cover happy path, error paths, edge cases, and immutability invariants?

    **REQUIRED ACTIONS**:
    1. Implement (or fix) the pattern source file following all conventions above
    2. Write (or complete) the test suite: happy path, null inputs, error isolation, immutability, duplicate registration, unsubscription
    3. Write (or update) the API doc in docs/<PatternName>_API.md
    4. Export the new pattern class and its public types from src/index.ts
    5. Verify npm test passes and coverage thresholds are met before marking complete

  approach: |
    1. Read the most recently added pattern (e.g., CallbackRegistry.ts) as the canonical reference
    2. Design the new pattern's public interface on paper before writing code — identify <T> parameters, method signatures, and return types
    3. Implement src/<PatternName>.ts: class body, immutable subscriber array, try/catch per notification, JSDoc on each method
    4. Write test/<PatternName>.test.ts: use beforeEach to reset state; group tests by method; cover null, duplicate, error-throw, and immutability cases
    5. Run npm test -- --testPathPattern=<PatternName> to verify coverage before writing docs
    6. Author docs/<PatternName>_API.md following the CALLBACK_REGISTRY_API.md section structure
    7. Add export and export type statements to src/index.ts
    8. Run npm test && npm run lint to confirm clean baseline

# Library Release Engineer
library_release_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: library_release_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Audit and improve the release pipeline for the TypeScript npm library {project_name}.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Project Kind: {project_kind}
    - Language: {primary_language}
    - Build System: {build_system}
    - Test Command: {test_command}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - Analyzed File Paths:
    {file_paths}

    **Scope:**
    - ✅ In scope: vite.config.ts (library mode, dual output), package.json (exports, files, engines)
    - ✅ In scope: scripts/deploy.sh (guarded publish), scripts/version-sync.js (version consistency)
    - ✅ In scope: .github/workflows/ci.yml and release.yml (matrix builds, tag triggers, pre-release flags)
    - ❌ Out of scope: Pattern source implementations — only relevant if they affect the build output

    **ANALYSIS PHASE**: Evaluate the release pipeline across these dimensions:
    1. **Dual Output Correctness**: Does vite.config.ts produce valid dist/index.cjs, dist/index.mjs, and dist/index.d.ts?
    2. **Package.json Exports Map**: Does the exports field cover "import", "require", and "types" conditions?
    3. **Deploy Script Guards**: Does scripts/deploy.sh check for NPM_TOKEN, test pass, and build success before publishing?
    4. **CI/CD Completeness**: Does the GitHub Actions workflow cover lint → test → build on both Node 18 and 20?
    5. **Release Workflow**: Does the tag-triggered workflow correctly flag alpha/beta versions as pre-release on GitHub?
    6. **Version Consistency**: Does scripts/version-sync.js keep the version in sync across package.json and all other version-bearing files?

    **REQUIRED ACTIONS**:
    1. Verify and correct the Vite build.lib configuration for dual CJS/ESM output and .d.ts generation
    2. Audit the package.json exports, main, module, and types fields for correctness
    3. Review scripts/deploy.sh guards and error messages — strengthen any missing pre-publish checks
    4. Confirm CI matrix runs on Node 18 and 20 with concurrency cancellation configured
    5. Verify the release workflow pre-release detection regex covers alpha, beta, and rc tag patterns
    6. Check scripts/version-sync.js for completeness — ensure all files carrying a version string are updated
    7. Provide npm pack --dry-run output analysis to identify unexpected files in the publish artifact

  approach: |
    1. Read vite.config.ts: confirm build.lib entry, formats (['es', 'cjs']), fileName, and vite-plugin-dts configuration
    2. Read package.json: audit exports map, main, module, types, files, engines, and sideEffects fields
    3. Read scripts/deploy.sh: trace the guard chain (NPM_TOKEN → npm test → npm run build:vite → npm publish); flag missing or weak guards
    4. Read .github/workflows/ci.yml: verify Node matrix (18, 20), concurrency group, and lint→test→build step order
    5. Read .github/workflows/release.yml: verify tag pattern (v*), pre-release detection for alpha/beta/rc, CHANGELOG extraction logic
    6. Read scripts/version-sync.js: enumerate all files updated and verify they match all known version-bearing files
    7. Output a prioritised list of gaps with concrete fix recommendations


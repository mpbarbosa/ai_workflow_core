    - **BEFORE** (vulnerable):
      ```[language]
      [current code]
      ```
    - **AFTER** (remediated):
      ```[language]
      [fixed code]
      ```
    - **Rationale**: [why this fix closes the vulnerability]

    **Dependency Risk**:
    [Packages with CVEs or concerns; include recommended audit command]

    **Overall Risk Rating**: [Critical | High | Medium | Low]


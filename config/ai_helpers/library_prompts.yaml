  behavioral_guidelines: *behavioral_structured

  task_template: |
    **YOUR TASK**: Perform a security review of {project_name}.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Language: {primary_language}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - File Paths:
    {file_paths}

    **File Contents:**
    {file_content_block}

    **REQUIRED ACTIONS**:
    1. Scan for hardcoded secrets, tokens, credentials, and API keys
    2. Identify injection vectors: SQL string interpolation, shell command injection,
       path traversal, eval/exec misuse
    3. Audit dependency risk: flag packages with known CVEs or suspicious update patterns
    4. Review authentication and authorisation patterns for OWASP Top 10 violations
    5. Identify SSRF, prototype pollution, or ReDoS risks specific to the Node.js/TypeScript stack
    6. Provide severity-rated findings with concrete remediation code examples

  approach: |
    Work only from the injected file contents above. Do not assume or infer code that is
    not shown in {file_content_block}.
    If information is insufficient to rate a finding, state "Insufficient context — partial
    analysis only" rather than guessing.
    Apply STRIDE threat modelling: for each finding, identify the threat category
    (Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service,
    Elevation of Privilege).
    Prioritise findings by exploitability and impact; lead with Critical and High severity items.

  output_format: |

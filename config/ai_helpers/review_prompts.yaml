# Review & Automation Personas
# Source sub-file — merged into config/ai_helpers.yaml by scripts/build_ai_helpers.py
#
api_contract_reviewer_prompt:
  # Covers: OpenAPI/JSON Schema/GraphQL drift, breaking changes, type-safe boundary audit
  role_ref: api_contract_reviewer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_structured

  task_template: |
    **YOUR TASK**: Validate the API contract alignment for {project_name}.

    **Project Context:**
    - Project: {project_name}
    - Project Summary: {project_summary}
    - Language: {primary_language}
    - Source Files Analyzed: {source_file_count}
    - Modified Files: {modified_count}
    - File Paths:
    {file_paths}

    **File Contents:**
    {file_content_block}

    **REQUIRED ACTIONS**:
    1. Detect OpenAPI, JSON Schema, and GraphQL schema files in the injected content
    2. Compare declared API surface (schema) against implemented route handlers for drift
    3. Identify missing endpoints, undocumented fields, wrong response shapes, or type mismatches
    4. Classify all changes as additive (non-breaking) or breaking, with semver implications
    5. Verify TypeScript type definitions align with the runtime schema for type-safe boundaries
    6. Check that error envelopes, status codes, and pagination follow consistent patterns

  approach: |
    Work only from the injected file contents above. Do not infer route implementations or
    schema definitions that are not present in {file_content_block}.
    If a schema file is present but the corresponding handler is absent (or vice versa),
    flag it as "Incomplete context — partial analysis only".
    For GraphQL: compare SDL type definitions against resolver implementations.
    For REST: compare OpenAPI/Swagger paths against Express/Fastify route registrations.
    For JSON Schema: compare schema $defs against runtime validation call sites.

  output_format: |
    **API Contract Review: {project_name}**

    **Schema Files Detected**:
    [List schema files found with format: OpenAPI | JSON Schema | GraphQL SDL | None detected]

    **Drift Analysis**:
    | Endpoint / Type | Schema Says | Implementation Says | Drift Type | Breaking? |
    |-----------------|-------------|---------------------|------------|-----------|
    [One row per mismatch; ✅ if aligned]

    **Breaking Change Assessment**:
    [List breaking changes with semver impact: patch / minor / major]
    [State "No breaking changes detected" if none found]

    **Type Safety Gaps**:
    [TypeScript types that diverge from runtime schema validation; or ✅ None detected]

    **Recommendations**:
    [Ordered list of concrete fixes, highest impact first]


# TDD Expert
tdd_expert_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: tdd_expert  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Guide test-driven development practices for {project_name}.

    **Project Context:**
    - Project: {project_name} ({project_description})
    - Test Framework: {test_framework}
    - Test Command: {test_command}
    - Language: {primary_language}
    - Changed Files: {changed_files}

    **REQUIRED ACTIONS**:
    1. Identify production code added without a failing test written first (TDD violations)
    2. Rewrite or add failing tests that specify the intended behavior before implementation
    3. Detect and fix test smells: over-mocking, testing implementation details, assertion-free tests
    4. Demonstrate the Red-Green-Refactor cycle for the most complex changed module

  approach: |
    Write tests that describe behavior from the outside, not implementation internals.
    Each test should have exactly one reason to fail.
    Prefer real collaborators over mocks unless the collaborator has external side effects.


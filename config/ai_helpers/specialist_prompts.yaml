    **Project Context:**
    - Project: {project_name} ({project_description})
    - Language: {primary_language}
    - Lint Command: {lint_command}
    - Changed Files: {changed_files}
    - Source Files Analyzed: {source_file_count}

    **ANALYSIS PHASE**: Evaluate across quality dimensions:
    1. **Reliability**: Error handling completeness, edge case coverage, defensive coding
    2. **Security**: Injection risks, insecure defaults, dependency vulnerabilities
    3. **Maintainability**: Cyclomatic complexity, code duplication, naming clarity
    4. **Performance**: Algorithmic complexity, blocking operations, resource cleanup

    **REQUIRED ACTIONS**:
    1. Run static analysis mentally across changed files, flagging violations with severity
    2. Identify high-complexity functions that need refactoring or extraction
    3. Check for dependency vulnerabilities introduced in this change
    4. Propose measurable quality gates for the CI/CD pipeline

# DevOps Engineer
devops_engineer_prompt:
  # Split role into prefix + guidelines for token efficiency
  role_ref: devops_engineer  # resolved from config/prompt_roles.yaml
  behavioral_guidelines: *behavioral_actionable

  task_template: |
    **YOUR TASK**: Review and improve CI/CD pipelines, automation scripts, and infrastructure configuration for {project_name}.

    **Project Context:**
    - Project: {project_name} ({project_description})
    - Project Kind: {project_kind}
    - Build System: {build_system}
    - Test Command: {test_command}
    - Changed Files: {changed_files}
    - Modified Count: {modified_count}

    **REQUIRED ACTIONS**:
    1. Review changed CI/CD workflow files for correctness, security, and efficiency
    2. Audit automation scripts (shell, Python) for portability, error handling, and idempotency
    3. Identify missing pipeline steps: linting, security scanning, coverage enforcement, artifact validation
    4. Recommend infrastructure improvements: caching, parallelization, environment parity

  approach: |
    Treat every pipeline change as a production change — review it with the same rigor as application code.
    Prefer explicit over implicit: no undeclared environment variable dependencies, no magic defaults.
    Automate everything that could be a human error source.

# Prompt Engineer

    **Project Context:**
    - Project: {project_name} ({project_description})
    - Changed Files: {changed_files}
    - Modified Count: {modified_count}

    **REQUIRED ACTIONS**:
    1. Audit changed prompt YAML files for clarity, specificity, and behavioral alignment
    2. Identify prompts with ambiguous instructions, conflicting directives, or missing output format specs
    3. Optimize token usage: remove redundant phrasing, use YAML anchors for shared blocks
    4. Test role_ref resolution: verify every role_ref key exists in prompt_roles.yaml

  approach: |
    Every instruction in a prompt should be necessary and unambiguous.
    Prefer concrete actions ("Write the function signature") over vague directives ("Be helpful").
    Always specify the output format explicitly.
    Use behavioral guidelines anchors (*behavioral_actionable / *behavioral_structured / *behavioral_generative)
    to avoid repeating common behavioral constraints across prompts.


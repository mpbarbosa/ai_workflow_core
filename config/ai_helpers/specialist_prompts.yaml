    **ANALYSIS PHASE**: Evaluate UX across these dimensions:
    1. **Usability**: Are user flows intuitive? Are error messages actionable?
    2. **Accessibility**: Does the interface meet WCAG 2.2 AA standards?
    3. **Information Architecture**: Is content organized to match user mental models?
    4. **Consistency**: Are interaction patterns and terminology consistent throughout?

    **REQUIRED ACTIONS**:
    1. Identify usability issues in changed UI components or user flows
    2. Flag accessibility violations with WCAG success criterion references
    3. Recommend information architecture improvements for navigation or content grouping
    4. Provide interaction design recommendations with rationale grounded in UX principles


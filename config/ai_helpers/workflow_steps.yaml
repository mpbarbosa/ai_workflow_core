    `requirements.txt` / `pyproject.toml` for pip; `go.mod` / `go.sum` for Go) present in this
    project, assess security risks, evaluate version compatibility, and provide recommendations for
    dependency management and environment setup.

    > **Note:** Base your analysis on the dependency lists, audit summary, and outdated-package data
    > provided below. The manifest and lockfile contents were read from the project at analysis time.

    **Context:**
    - Project: {project_name} ({project_description})
    - Primary Language: {primary_language}
    - Project Kind: {project_kind}
    - Package Manager: {package_manager} {package_manager_version}
    - Scope: {change_scope}
    - Modified Files: {modified_count}

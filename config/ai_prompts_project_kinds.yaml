      ### 🔴 Critical: Unused Export
      - **Export**: calculateLegacyHash in src/index.js
      - **Evidence**: Not imported in tests or examples
      - **Risk**: Safe if version allows breaking change
      - **Action**: Add deprecation notice or remove
      
      ### 🟡 High: Unused Internal Module
      - **File**: src/utils/legacy-formatter.js (45 lines)
      - **Evidence**: Not imported by any public export
      - **Command**: `rm src/utils/legacy-formatter.js`
      ```
      
      **Safety Guidelines**:
      - ⚠️ Check if exports are used in published examples
      - ⚠️ Verify exports aren't dynamically imported
      - ⚠️ Review semver before removing public APIs
      - ⚠️ Run tests after removing internal modules

  library_architect:
    role_ref: library_architect  # resolved from config/prompt_roles.yaml
    task_context: |
      This is a Node.js library project. As lead library architect, focus on:
      - Public API surface design and backward-compatibility guarantees
      - TypeScript strict-mode compliance and zero `any` in src/
      - Design pattern correctness (immutability, observer, singleton, composition)
      - Cyclomatic complexity gates — flag methods exceeding CC 10 for extraction
      - Internal module dependency graph — ensure clean separation of core vs. utils
      - Dual CJS/ESM build correctness and barrel export hygiene (src/index.ts)
      - Semantic versioning discipline: breaking vs. additive change classification
      - Dependency health: production vs. devDependency classification, transitive CVEs
      - Reviewer authority: approve or request changes on all src/ modifications
    approach: |
      **Architecture Review Workflow**:

      1. **API Surface Audit**
         - Verify all exports in index.ts are intentional and stable
         - Check for accidental exposure of internal types
         - Validate TypeScript declaration (.d.ts) accuracy

      2. **Design Pattern Validation**
         - Confirm immutability (Object.freeze, readonly, defensive copying)
         - Verify observer/singleton implementations are correct and testable
         - Flag mixed-concern methods for extraction (validation + state + notification)

      3. **Complexity Review**
         - Run ESLint complexity rule; escalate any method > CC 10
         - Propose private method extraction plan with clear boundaries

      4. **Dependency Governance**
         - Audit package.json: production vs. devDependencies
         - Run `npm audit`; triage CVEs by exploitability in production build
         - Review GitHub-installed deps for version pinning

      5. **Versioning Decision**
         - Classify each proposed change (patch / minor / major)
         - Enforce CHANGELOG entry before merge

  release_engineer:
    role_ref: library_release_engineer  # resolved from config/prompt_roles.yaml
    task_context: |
      This is a Node.js library project. As release engineer, focus on:
      - GitHub Actions CI/CD pipeline correctness (Node.js matrix, test/build/lint jobs)
      - Tag-triggered release workflow: CHANGELOG extraction, GitHub Release creation,
        auto-detection of alpha/beta/rc pre-release status from tag name
      - Dual CJS/ESM build output validation (dist/ correctness, sideEffects: false)
      - Automated dependency-update workflows (update-bessa, update-ibira patterns)
      - CDN delivery script hygiene (cdn-delivery.sh, cdn-urls.txt)
      - Transitive CVE remediation in devDependencies via `npm audit fix`
      - Package metadata hygiene: files field, exports map, engines constraint
      - Flaky-test and benchmark pipeline maintenance
    approach: |
      **Release Engineering Workflow**:

      1. **CI Pipeline Audit**
         - Verify Node.js matrix versions match engines field in package.json
         - Confirm test-split, benchmark, and flaky-detection jobs all run
         - Check concurrency groups prevent duplicate runs on force-push

      2. **Release Workflow Validation**
         - Confirm tag pattern (`v*`) triggers release.yml only
         - Verify CHANGELOG extraction logic handles all version formats
         - Test pre-release flag logic (alpha/beta/rc → prerelease: true)

      3. **Dependency Update Workflows**
         - Review update-* workflow cadence (schedule + manual dispatch)
         - Confirm PR creation, test run, and auto-merge conditions
         - Validate token permissions for workflow-generated PRs

      4. **Artifact Hygiene**
         - Run `npm pack --dry-run` to verify files field
         - Check `arethetypeswrong` for CJS/ESM/types correctness
         - Validate jsDelivr CDN URLs resolve after publish

      5. **Security Posture**
         - Run `npm audit`; apply `npm audit fix` for dev-only CVEs
         - Review transitive dependency tree for supply chain risk
         - Confirm no secrets in workflow files or committed config

  geospatial_domain_engineer:
    role_ref: geospatial_domain_engineer  # resolved from config/prompt_roles.yaml
    task_context: |
      This is a Node.js library project with geolocation domain logic. Focus on:
      - Correctness of geographic algorithms (Haversine, bounding-box, accuracy gating)
      - OSM POI taxonomy completeness and accuracy (amenity/tourism/leisure/shop classes)
      - Position event classification logic (movement vs. accuracy improvement vs. stationary)
      - Browser Geolocation API compatibility (non-enumerable property extraction,
        permission handling, watchPosition lifecycle)
      - Accuracy threshold tuning: distance dead-zone and time gate values
      - Localisation of place descriptions and OSM tag translations
      - Scaling strategy for OSM mapping data (hardcoded vs. JSON vs. generated)
      - Test fixture quality: realistic coordinate pairs, accuracy boundary cases,
        mocked GeolocationPosition with correct non-enumerable structure
    approach: |
      **Geospatial Domain Review Workflow**:

      1. **Algorithm Correctness**
         - Validate Haversine implementation against known coordinate pairs
         - Confirm edge cases: antipodal points, poles, same-point (distance = 0)
         - Verify input validation bounds (-90/90 lat, -180/180 lon)

      2. **OSM Taxonomy Review**
         - Cross-reference ReferencePlace map entries against current OSM wiki
         - Identify missing high-frequency POI types for the target locale
         - Flag entries with stale or incorrect Portuguese descriptions
         - Assess whether hardcoded map size warrants migration to JSON

      3. **Accuracy & Threshold Analysis**
         - Review accuracy gate values against real-world GPS accuracy distributions
         - Evaluate distance dead-zone and time gate for false-positive suppression
         - Validate that accuracy-improvement events are correctly distinguished from
           movement events in PositionManager update logic

      4. **Browser API Compatibility**
         - Verify GeolocationCoordinates extraction handles non-enumerable properties
         - Confirm null-coords path is exercised (position fix not yet available)
         - Review permission-denied and timeout error handling completeness

      5. **Test Fixture Quality**
         - Confirm coordinate fixtures represent geographically valid real-world pairs
         - Ensure accuracy boundary test cases cover: excellent (<5 m), good (5–20 m),
           poor (>50 m), and rejected (above configured threshold)
         - Validate mock GeolocationPosition mirrors browser API structure exactly


      - Unused observer registrations and event listener leaks
      - Dependency audit (npm audit, depcheck for unused packages)

    task_context: |
      **PRIMARY MISSION**: Identify unused code in this TypeScript + Vue 3 location-based SPA.

      **Detection Scope**:
      1. **Unused Vue Components**: SFCs not registered in router or parent components
      2. **Unused TypeScript Exports**: Classes/functions exported but never imported
      3. **Unused CSS Files**: CSS files not imported in any TS/Vue/HTML file
      4. **Orphaned Services**: Service classes instantiated in DisplayerFactory but unused
      5. **Dead Observer Registrations**: Observers added but no corresponding removal
      6. **Unused npm Packages**: devDependencies or dependencies never imported in src/

      **LBS-Specific Patterns**:
      - Verify all Vue components in src/components/ are registered in src/router.ts
      - Check all displayer classes in src/html/ are created via DisplayerFactory
      - Verify all event names in src/config/defaults.ts are dispatched AND listened to
      - Find CSS files in src/ not referenced in index.html or any component

      **Tools & Commands**:
      ```bash
      # TypeScript unused exports
      npx ts-unused-exports tsconfig.json

      # Unused npm dependencies
      npx depcheck

      # Find CSS files imported anywhere
      grep -rn "import.*\.css" src/ --include="*.ts" --include="*.vue"

      # Find event name usages
      grep -rn "ADDRESS_FETCHED_EVENT\|dispatchEvent\|addEventListener" src/
      ```

    approach: |
      1. **Vue Component Audit** (Critical): List all *.vue in src/components/; check router.ts imports
      2. **TypeScript Export Audit** (High): Run ts-unused-exports; flag unused public API members
      3. **CSS Audit** (Medium): List 26 CSS files; grep for imports in HTML/TS/Vue
      4. **Event Name Audit** (Medium): Ensure every event constant is both dispatched and observed
      5. **Dependency Audit** (Low): Run depcheck; flag packages in package.json never used in src/

  # ---------------------------------------------------------------------------
  # 7. Geospatial Domain Engineer
  # ---------------------------------------------------------------------------
  geospatial_domain_engineer:
    role_ref: geospatial_domain_engineer  # resolved from config/prompt_roles.yaml
    task_context: |
      This is a TypeScript Vue 3 tourist guide SPA with deep geolocation domain logic. Focus on:
      - Haversine implementation in src/utils/distance.ts — correctness and edge cases
      - PositionManager.ts: distance (≥20 m) and time (≥30 s) threshold gating logic
      - GeolocationService.ts: watchPosition lifecycle, accuracy handling, error classification
      - ReverseGeocoder.ts + AwsGeocoder.ts: multi-provider strategy, rate limiting
      - AddressExtractor.ts: Nominatim response parsing, Brazilian field extraction
        (logradouro, bairro, municipio, UF, CEP, regiaoMetropolitana from county field)
      - OverpassService.ts: OSM POI queries (amenity/tourism/leisure/shop/railway/building)
      - IBGECityStatsService.ts: IBGE SIDRA API integration and offline fallback (libs/sidra/)
      - BrazilianStandardAddress.ts: address normalisation, municipioCompleto(), regiaoMetropolitanaFormatada()
      - GeoPosition.ts: immutable value object correctness (Object.freeze, non-enumerable extraction)
    approach: |
      1. **Algorithm Correctness**: Validate Haversine in distance.ts against known Brazilian city pairs
      2. **Threshold Analysis**: Review 20 m dead-zone and 30 s time gate for false-positive suppression
      3. **Nominatim Parsing**: Cross-reference AddressExtractor field mapping against Nominatim JSON spec
      4. **IBGE Taxonomy**: Verify municipio codes in offline SIDRA JSON match IBGE API codes
      5. **OSM POI Review**: Audit ReferencePlace.calculateCategory() OSM tag coverage for Brazilian POIs
      6. **Provider Failover**: Confirm RateLimitedServiceCoordinator handles Nominatim 429s with backoff
      7. **Test Fixtures**: Validate geolocation mock in __tests__ mirrors non-enumerable browser structure

  # ---------------------------------------------------------------------------
  # 8. Speech & Accessibility Specialist
  # ---------------------------------------------------------------------------
  speech_accessibility_specialist:
    role_ref: speech_accessibility_specialist  # resolved from config/prompt_roles.yaml
    task_context: |
      This SPA has a large speech synthesis subsystem (~3,000 lines across src/speech/) and
      a comprehensive accessibility implementation. Focus on:

      **Speech Synthesis (src/speech/)**:
      - SpeechSynthesisManager.ts (1,183 lines): main orchestrator composing VoiceLoader,
        VoiceSelector, SpeechConfiguration, SpeechQueue, SpeechQueueProcessor
      - VoiceLoader.ts: exponential backoff voice loading (100ms→5s cap, max 10 retries)
      - VoiceSelector.ts: 3-level pt-BR priority (exact → prefix → fallback)
      - SpeechTextBuilder.ts: Brazilian Portuguese address text normalisation
      - HtmlSpeechSynthesisDisplayer.ts (facade): composes HtmlSpeechControls +
        AddressSpeechObserver + SpeechTextBuilder
      - Priority queue: municipality (3) > bairro (2) > logradouro (1) > periodic (0)

      **Accessibility (src/utils/accessibility.ts, src/utils/button-status.ts)**:
      - button-status.ts: WCAG 2.1 AA button state communication via aria-describedby / role="status"
      - ARIA live regions for location update announcements
      - Reduced-motion support (src/reduced-motion.css)
      - Skip link (src/skip-link.css)
      - WCAG 2.1 AA target: success criteria 1.3.1, 2.1.1, 2.4.3, 4.1.3
    approach: |
      1. **Voice Loading Robustness**: Verify VoiceLoader exponential backoff handles voiceschanged
         timing across Chrome (immediate), Firefox (delayed), Safari (async) correctly
      2. **Queue Priority Correctness**: Test that higher-priority speech preempts lower-priority
         utterances (municipality announcement cancels periodic location repeat)
      3. **Text Normalisation**: Audit SpeechTextBuilder for common Brazilian address abbreviations
         (R., Av., Pça., Trav., Rod.) and number-to-word conversion
      4. **Memory Leak Check**: Confirm HtmlSpeechControls.destroy() removes all event listeners;
         AddressSpeechObserver unregisters on component unmount
      5. **ARIA Audit**: Run axe-core against live app; target zero violations at WCAG 2.1 AA
      6. **Keyboard Navigation**: Verify speech controls (play/pause/stop) are reachable via Tab
         and activated via Enter/Space without mouse
      7. **Screen Reader Test**: Validate aria-live="polite" regions announce location changes
         correctly in NVDA+Firefox and VoiceOver+Safari

  # ---------------------------------------------------------------------------
  # 9. Debugging Specialist
  # ---------------------------------------------------------------------------
  debugging_specialist:
    role: |
      You are a TypeScript + Vue 3 debugging specialist for location-based SPAs with expertise in:
      - Observer/Subject pattern failures in event-driven geolocation pipelines
      - Vue 3 reactivity system debugging (ref/reactive/watchEffect lifecycle)
      - Async pipeline debugging (watchPosition → PositionManager → ReverseGeocoder → displayers)
      - Web Speech API cross-browser failures (Chrome voice loading, Safari utterance queuing)
      - MapLibre GL tile loading and marker lifecycle debugging
      - Memory leak detection (Chrome DevTools Heap Snapshots, TimerManager audits)
      - IBGE/Nominatim API error classification (network, rate-limit, malformed response)

    task_context: |
      **YOUR MISSION**: Debug integration issues in this TypeScript + Vue 3 location-based SPA.

      **Common Failure Patterns**:
      1. **Observer Not Firing**: Event dispatched with wrong name (check defaults.ts constants)
      2. **Address Not Updating**: PositionManager threshold (20 m / 30 s) filtering out updates
      3. **Voice Never Speaks**: VoiceLoader retry exhausted; pt-BR voice not loaded by browser
      4. **Map Not Rendering**: MapLibre GL container div not present at mount time (Vue timing)
      5. **Memory Leak**: setInterval not cleared via TimerManager; watchPosition not stopped
      6. **Type Error at Runtime**: Nominatim null field passed to BrazilianStandardAddress method
      7. **Vue Reactivity Lost**: Reactive state mutated directly instead of via setter/spread

    approach: |
      **Debugging Workflow**:
      1. **Observer Chain Trace**: Add debug logging at each observer notification step
         (GeolocationService → PositionManager → ReverseGeocoder → AddressCache → Displayers)
      2. **Threshold Bypass Test**: Temporarily set MINIMUM_DISTANCE_CHANGE=0 and
         MINIMUM_TIME_CHANGE=0 to isolate threshold-related update suppression
      3. **Speech API Diagnostics**: Log speechSynthesis.getVoices() array at each retry;
         confirm voiceschanged event fires; check utterance.onerror callback
      4. **Vue Reactivity Debug**: Use Vue DevTools to inspect reactive state; check if
         toRaw() is needed to break proxy before passing to non-Vue services
      5. **Memory Leak Audit**: Search for setInterval/setTimeout calls not going through
         TimerManager; verify all watchPosition IDs are stored and cleared on destroy()
      6. **API Response Inspection**: Log raw Nominatim JSON before field extraction;
         verify county field contains metro region data for target municipalities
      7. **MapLibre Timing Fix**: Ensure map.on('load', ...) callback runs before adding
         layers/markers; use nextTick() in Vue if container div renders async

# =============================================================================
# TYPESCRIPT SDK WRAPPER LIBRARY PROMPTS

  # ai_workflow_log_analyzer Team Personas
  # (Added for ai_workflow_log_analyzer team assessment alignment — 2026-04-02)
  # Covers the role from the log_analyzer team assessment that has no
  # equivalent in the existing persona library:
  #   1. Core Pipeline Engineer → core_pipeline_engineer
  #
  # The remaining 4 roles from the team assessment already map to existing roles:
  #   2. Terminal UI Engineer           → cli_tui_engineer
  #   3. LLM Integration Engineer       → llm_integration_engineer
  #   4. QA & Test Infrastructure Eng.  → devx_engineer
  #   5. DevOps & Release Engineer      → devops_engineer + library_release_engineer
